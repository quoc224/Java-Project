spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.jpa.defer-datasource-initialization=true

app.jwt.secret=test-secret-key-for-ci-must-be-at-least-256-bits-long-padding-hehe
app.jwt.expiration-milliseconds=900000
app.jwt.remember-me-expiration-milliseconds=604800000
app.jwt.refresh-expirationMs-milliseconds=86400000

cloudinary.cloud-name=test
cloudinary.upload-preset=test

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB