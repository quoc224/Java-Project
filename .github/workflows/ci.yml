name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    env:
      DB_PASSWORD: not-used-in-test
      JWT_SECRET: test-secret-key-for-ci-must-be-at-least-256-bits-long-padding-ok
      CLOUD_NAME: test
      UPLOAD_PRESET: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit & integration tests (H2, skip native-query tests)
        run: mvn test -Dspring.profiles.active=test --no-transfer-progress

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7